{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HappyHome — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            background: #f7f7f7;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            width: 360px;
            background: #fff;
            border-radius: 14px;
            border: 1px solid #f0f0f0;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        .login-top {
            background: #8e261a;
            padding: 24px 28px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .login-top img {
            width: 50px;
            height: 50px;
            padding: 4px;
        }

        .login-top h2 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .login-top p {
            font-size: 11px;
            color: rgba(255,255,255,0.65);
        }

        .login-body {
            padding: 28px;
        }

        .login-body p {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 14px;
        }

        .login-body label {
            font-size: 12px;
            font-weight: 500;
            color: #1a1a1a;
        }

        .login-body input {
            height: 38px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 0 12px;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: border-color 0.15s;
        }

        .login-body input:focus {
            border-color: #c0392b;
        }

        .login-btn {
            width: 100%;
            height: 40px;
            background: #8e261a;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            margin-top: 6px;
            transition: background 0.15s;
        }

        .login-btn:hover { background: #a93226; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-top">
        <img src="{% static 'img/logo.png' %}" alt="logo">
        <div>
            <h2>HappyHome</h2>
            <p>Management System</p>
        </div>
    </div>

    <div class="login-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="login-btn">Sign in</button>
        </form>
    </div>
</div>

</body>
</html>
