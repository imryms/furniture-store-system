{% extends 'base.html' %}
{% block content %}

<div class="profile-card">

    <div class="profile-top">
        <div class="profile-avatar">
            {{ user.first_name|slice:":1"|upper }}{{ user.last_name|slice:":1"|upper }}
        </div>
        <div>
            <div class="profile-name">{{ user.first_name }} {{ user.last_name }}</div>
            <div class="profile-meta">{{ user.branch }}</div>
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-fields" style="padding: 20px 20px 0;">

            <div class="form-field">
                <label>Username</label>
                <input type="text" value="{{ user.username }}" class="optional" disabled>
            </div>

            <div class="form-row">
                <div class="form-field">
                    <label>First name</label>
                    <input type="text" name="first_name" value="{{ user.first_name }}" placeholder="First name">
                </div>
                <div class="form-field">
                    <label>Last name</label>
                    <input type="text" name="last_name" value="{{ user.last_name }}" placeholder="Last name">
                </div>
            </div>

            <div class="form-field">
                <label>Email</label>
                <input type="email" name="email" value="{{ user.email }}" placeholder="email@example.com">
            </div>

            <div class="form-field">
                <label>Branch</label>
                <input type="text" value="{{ user.branch }}" class="optional" disabled>
            </div>

        </div>

        <div class="form-footer" style="padding: 16px 20px;">
            <button type="submit" class="btn-save">
                <i class="bi bi-floppy"></i> Save changes
            </button>
        </div>

    </form>
</div>

{% endblock %}
